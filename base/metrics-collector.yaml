apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: scoreserver-metrics-collector
  labels:
    app.kubernetes.io/name: scoreserver-metrics-collector
    app.kubernetes.io/component: metrics-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scoreserver-metrics-collector
      app.kubernetes.io/component: metrics-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scoreserver-metrics-collector
        app.kubernetes.io/component: metrics-collector
    spec:
      serviceAccountName: scoreserver
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otelcol
          image: otel/opentelemetry-collector-contrib:0.122.1
          args:
            - --config=/conf/collector.yaml
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: host
            - name: PGDATABASE
              value: ictscore
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: password
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: otlp.telemetry:4317
          ports:
            - containerPort: 13133
              name: health-check
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: health-check
          readinessProbe:
            httpGet:
              path: /
              port: health-check
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 128Mi
              cpu: 500m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: scoreserver-metrics-collector-config
