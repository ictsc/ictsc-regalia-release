apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoreserver-image-cache
  labels:
    app.kubernetes.io/name: scoreserver-image-cache
    app.kubernetes.io/component: image-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scoreserver-image-cache
      app.kubernetes.io/component: image-cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scoreserver-image-cache
        app.kubernetes.io/component: image-cache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginx
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              memory: 8Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              name: configs
              readOnly: true
            - mountPath: /var/cache/nginx
              name: nginx-cache
            - mountPath: /var/run
              name: nginx-run
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: configs
          configMap:
            name: scoreserver-image-cache-configs
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: scoreserver-image-cache
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: scoreserver-image-cache
    app.kubernetes.io/component: image-cache
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: scoreserver-image-cache
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: scoreserver-image-cache
  ingress:
    - fromEntities: [cluster]
      toPorts:
        - ports:
            - port: http
              protocol: TCP
