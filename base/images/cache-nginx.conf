proxy_cache_path /var/cache/nginx/image-cache levels=1:2 keys_zone=image_cache:10m max_size=1g inactive=24h use_temp_path=off;

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    location = /healthz {
        access_log off;
        return 200;
    }

    location / {
        proxy_cache image_cache;
        proxy_cache_lock on;
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 1m;
        proxy_ignore_headers Set-Cookie;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_pass http://scoreserver-image-source:8080;
    }
}
