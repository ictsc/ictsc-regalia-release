apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: scoreserver-image-source
  labels:
    app.kubernetes.io/name: scoreserver-image-source
    app.kubernetes.io/component: image-source
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scoreserver-image-source
      app.kubernetes.io/component: image-source
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scoreserver-image-source
        app.kubernetes.io/component: image-source
    spec:
      serviceAccountName: scoreserver-image
      securityContext:
        runAsNonRoot: true
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: git-sync
          image: git-sync
          restartPolicy: Always
          args:
            - --repo=git@github.com:ictsc/ictsc2025-final-master.git
            - --root=/var/lib/git-sync
            - --period=60s
            - --link=current
            - --ssh-key-file=/run/git-sync/deploy.key
            - --ssh-known-hosts-file=/etc/git-sync/known_hosts
          volumeMounts:
            - mountPath: /var/lib/git-sync
              name: sync-data
            - mountPath: /run/git-sync/deploy.key
              subPath: deploy.key
              name: master-deploy-key
              readOnly: true
            - mountPath: /etc/git-sync/known_hosts
              subPath: known_hosts
              name: configs
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: nginx
          image: nginx
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              memory: 8Mi
              cpu: 10m
            limits:
              memory: 32Mi
              cpu: 100m
          volumeMounts:
            - mountPath: /var/lib/git-sync
              name: sync-data
              readOnly: true
            - mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              name: configs
              readOnly: true
            - mountPath: /var/cache/nginx
              name: nginx-cache
            - mountPath: /var/run
              name: nginx-run
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: configs
          configMap:
            name: scoreserver-image-source-configs
        - name: master-deploy-key
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: scoreserver-master-deploy-key
        - name: sync-data
          ephemeral:
            volumeClaimTemplate:
              spec:
                storageClassName: topolvm-provisioner
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: 2Gi
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: scoreserver-image-source
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: scoreserver-image-source
    app.kubernetes.io/component: image-source
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: scoreserver-image-source
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: scoreserver-image-source
      app.kubernetes.io/component: image-source
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: scoreserver-image-cache
      toPorts:
        - ports:
            - port: http
              protocol: TCP
