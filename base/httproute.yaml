apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: scoreserver-contestant
spec:
  parentRefs:
    - kind: Gateway
      name: web
      namespace: gateway
  hostnames:
    - contest-placeholder.invalid
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /images
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: scoreserver-image-cache
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: scoreserver-backend
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: scoreserver-frontend
          port: 8080
---
