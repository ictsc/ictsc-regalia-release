---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: scoreserver-admin
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: scoreserver-admin
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: scoreserver-contestant-internal
  oidc:
    provider:
      issuer: https://dex.ictsc.net
    clientID: $admin-client-id
    clientSecret:
      name: scoreserver-admin-oauth-client
    scopes:
      - openid
      - profile
      - groups
      - offline_access
    cookieConfig:
      sameSite: Lax
    logoutPath: /logout
    forwardAccessToken: true
